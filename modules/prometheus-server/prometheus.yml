global:
  scrape_interval:     15s
  evaluation_interval: 15s

rule_files:
  # - "first.rules"
  # - "second.rules"

scrape_configs:
  - job_name: node-1
    static_configs:
      - targets: ['fft:9100']
  - job_name: node-2
    static_configs:
      - targets: ['framework-1:9100']
  - job_name: node-3
    static_configs:
      - targets: ['mini:9100']
  - job_name: node-4
    static_configs:
      - targets: ['godel:9100']
  - job_name: node-5
    static_configs:
      - targets: ['air:9100']
  - job_name: node-6
    static_configs:
      - targets: ['fft:9835']
  - job_name: node-router
    static_configs:
      - targets: ['192.168.8.1:9100']
        labels:
          node: router
          role: router

  - job_name: frigate-fft
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ['192.168.8.231:9187']
        labels:
          node: fft
          role: nvr
          service: frigate
